<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Driving VR – City Filter</title>
<style>
    body, html {
        margin: 0;
        padding: 0;
        overflow: hidden;
        background: black;
    }
    #video {
        position: absolute;
        width: 100%;
        height: 100%;
        object-fit: cover;
        transform: scaleX(-1); /* mirror for VR */
    }
    #vr {
        position: absolute;
        width: 100%;
        height: 100%;
    }
</style>
</head>
<body>

<video id="video" autoplay playsinline></video>
<canvas id="vr"></canvas>

<script>
// CAMERA FEED
navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
.then(stream => {
    document.getElementById("video").srcObject = stream;
});

// VR CANVAS
const canvas = document.getElementById("vr");
const ctx = canvas.getContext("2d");

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
resize();
window.onresize = resize;

// HEAD TRACKING
let yaw = 0, pitch = 0;

window.addEventListener("deviceorientation", e => {
    yaw = e.gamma / 30;
    pitch = e.beta / 60;
});

// DRAW LOOP
function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    const w = canvas.width;
    const h = canvas.height;
    const half = w / 2;

    drawEye(0, half, h, -yaw);
    drawEye(half, half, h, yaw);

    requestAnimationFrame(draw);
}

function drawEye(x, w, h, offset) {
    ctx.save();
    ctx.translate(x, 0);

    // CITY COLOR FILTER
    ctx.fillStyle = "rgba(20, 40, 80, 0.35)";
    ctx.fillRect(0, 0, w, h);

    // BUILDING OUTLINES
    for (let i = 0; i < 8; i++) {
        let bx = (i / 8) * w + offset * 20;
        let bw = w / 10;
        let bh = h * (0.3 + Math.random() * 0.4);

        ctx.strokeStyle = "rgba(200, 220, 255, 0.4)";
        ctx.lineWidth = 2;
        ctx.strokeRect(bx, h - bh, bw, bh);

        // WINDOWS
        ctx.fillStyle = "rgba(255,255,200,0.2)";
        for (let wy = h - bh + 10; wy < h - 10; wy += 20) {
            for (let wx = bx + 5; wx < bx + bw - 5; wx += 15) {
                ctx.fillRect(wx, wy, 8, 8);
            }
        }
    }

    // SKYLINE SILHOUETTE
    ctx.fillStyle = "rgba(0,0,0,0.4)";
    ctx.fillRect(0, h * 0.75, w, h * 0.25);

    // COCKPIT OVERLAY
    ctx.fillStyle = "rgba(0,0,0,0.5)";
    ctx.fillRect(0, h * 0.7, w, h * 0.3);

    // STEERING WHEEL
    ctx.strokeStyle = "white";
    ctx.lineWidth = 5;
    ctx.beginPath();
    ctx.arc(w/2 + offset*40, h*0.85, 60, 0, Math.PI*2);
    ctx.stroke();

    // SPEED TEXT
    ctx.fillStyle = "white";
    ctx.font = "28px sans-serif";
    ctx.fillText("SPEED: 45", w/2 - 70, 40);

    ctx.restore();
}

draw();
</script>

</body>
</html>
