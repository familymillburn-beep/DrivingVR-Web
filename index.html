<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Peaceful Truck Delivery</title>
<style>
    body, html {
        margin: 0;
        padding: 0;
        overflow: hidden;
        background: black;
    }
    #video {
        display: none;
    }
    #vr {
        position: absolute;
        width: 100%;
        height: 100%;
    }
</style>
</head>
<body>

<video id="video" autoplay playsinline></video>
<canvas id="vr"></canvas>

<script>
// CAMERA FEED (optional background feel)
navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
.then(stream => video.srcObject = stream)
.catch(err => console.log("Camera error:", err));

const canvas = document.getElementById("vr");
const ctx = canvas.getContext("2d");
const video = document.getElementById("video");

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
resize();
window.onresize = resize;

// HEAD TILT (for gentle steering)
let yaw = 0, pitch = 0;
window.addEventListener("deviceorientation", e => {
    if (e.gamma != null && e.beta != null) {
        yaw = e.gamma / 40;
        pitch = e.beta / 60;
    }
});

// WORLD / TRUCK STATE
let playerZ = 0;
let playerLane = 0; // -1, 0, 1
let speed = 0.03;   // slow, peaceful

// CITY BUILDINGS
const buildings = [];
const deliveryStops = [];
let currentStopIndex = 0;
let deliveredCount = 0;
let message = "Drive forward to deliver packages.";

function initCity() {
    buildings.length = 0;
    deliveryStops.length = 0;
    playerZ = 0;
    deliveredCount = 0;
    currentStopIndex = 0;
    message = "Drive forward to deliver packages.";

    // Side buildings
    for (let i = 0; i < 120; i++) {
        const side = Math.random() < 0.5 ? -1 : 1;
        const laneOffset = side * (2.5 + Math.random() * 1.5);
        const zPos = 5 + i * 1.5 + Math.random() * 1.0;
        buildings.push({
            x: laneOffset,
            z: zPos,
            w: 1 + Math.random() * 1,
            h: 3 + Math.random() * 5,
            color: side < 0 ? "rgba(90,140,200,0.9)" : "rgba(80,130,190,0.9)"
        });
    }

    // Delivery stops along center lane
    for (let i = 0; i < 6; i++) {
        const zPos = 20 + i * 20;
        deliveryStops.push({
            x: 0,
            z: zPos,
            reached: false
        });
    }
}
initCity();

// PROJECTOR
function project(x, y, zWorld, eyeOffset, w, h) {
    const fov = 1.3;
    const ex = eyeOffset;
    const z = zWorld - playerZ + 1; // move world toward player

    const zx = x - ex - yaw * 4;
    const zy = z;

    const scale = fov / zy;
    const sx = w / 2 + zx * scale * w * 0.12;
    const sy = h * 0.75 - y * scale * h * 0.25 - pitch * 40;

    return { x: sx, y: sy, z: zy };
}

// MAIN LOOP
function draw() {
    const w = canvas.width;
    const h = canvas.height;
    const half = w / 2;

    // Peaceful forward motion
    playerZ += speed;

    // Gentle lane drift from head tilt
    playerLane = yaw * 0.8;

    ctx.clearRect(0, 0, w, h);

    drawEye(0, half, h, -0.5);
    drawEye(half, half, h, 0.5);

    requestAnimationFrame(draw);
}

function drawEye(xOffset, w, h, eyeOffset) {
    ctx.save();
    ctx.translate(xOffset, 0);

    // Soft background from camera (optional)
    const camScale = 1.15;
    ctx.save();
    ctx.scale(camScale, camScale);
    ctx.drawImage(
        video,
        - (w * (camScale - 1)) / 2,
        - (h * (camScale - 1)) / 2,
        w,
        h
    );
    ctx.restore();

    // Soft blue tint
    ctx.fillStyle = "rgba(10,20,40,0.6)";
    ctx.fillRect(0, 0, w, h);

    // Road
    ctx.fillStyle = "rgba(20,30,50,0.95)";
    ctx.beginPath();
    ctx.moveTo(0, h * 0.8);
    ctx.lineTo(w, h * 0.8);
    ctx.lineTo(w * 0.7, h * 0.45);
    ctx.lineTo(w * 0.3, h * 0.45);
    ctx.closePath();
    ctx.fill();

    // Lane lines
    ctx.strokeStyle = "rgba(230,230,240,0.7)";
    ctx.lineWidth = 2;
    for (let i = -1; i <= 1; i++) {
        ctx.beginPath();
        const sx = w / 2 + i * 40;
        ctx.moveTo(sx, h * 0.8);
        ctx.lineTo(w / 2 + i * 20, h * 0.5);
        ctx.stroke();
    }

    // Sort buildings by depth
    const visibleBuildings = buildings.filter(b => b.z - playerZ > 1 && b.z - playerZ < 60);
    visibleBuildings.sort((a, b) => (b.z - a.z));

    visibleBuildings.forEach(b => {
        const left = project(b.x - b.w/2, 0, b.z, eyeOffset, w, h);
        const right = project(b.x + b.w/2, 0, b.z, eyeOffset, w, h);
        const leftTop = project(b.x - b.w/2, b.h, b.z, eyeOffset, w, h);
        const rightTop = project(b.x + b.w/2, b.h, b.z, eyeOffset, w, h);

        ctx.fillStyle = b.color;
        ctx.beginPath();
        ctx.moveTo(left.x, left.y);
        ctx.lineTo(right.x, right.y);
        ctx.lineTo(rightTop.x, rightTop.y);
        ctx.lineTo(leftTop.x, leftTop.y);
        ctx.closePath();
        ctx.fill();

        // Windows
        ctx.fillStyle = "rgba(255,255,220,0.5)";
        const rows = 6;
        const cols = 3;
        for (let r = 0; r < rows; r++) {
            for (let c = 0; c < cols; c++) {
                const t = (r + 1) / (rows + 1);
                const s = (c + 1) / (cols + 1);
                const wx = left.x + (right.x - left.x) * s;
                const wy = left.y + (leftTop.y - left.y) * t;
                ctx.fillRect(wx - 2, wy - 2, 4, 4);
            }
        }
    });

    // Delivery stops
    deliveryStops.forEach((stop, index) => {
        const dz = stop.z - playerZ;
        if (dz < 1 || dz > 60) return;

        const p = project(stop.x, 0, stop.z, eyeOffset, w, h);
        const size = 20 / dz * 10;

        // Glow circle
        ctx.fillStyle = index === currentStopIndex
            ? "rgba(180,255,200,0.9)"
            : "rgba(150,200,220,0.6)";
        ctx.beginPath();
        ctx.arc(p.x, p.y, size, 0, Math.PI * 2);
        ctx.fill();

        // Check delivery
        if (!stop.reached && index === currentStopIndex && dz < 2.5) {
            stop.reached = true;
            deliveredCount++;
            currentStopIndex++;
            if (currentStopIndex >= deliveryStops.length) {
                message = "All packages delivered. Take a calm drive.";
            } else {
                message = "Package delivered. Next stop ahead.";
            }
        }
    });

    // Truck cockpit
    ctx.fillStyle = "rgba(0,0,0,0.7)";
    ctx.fillRect(0, h * 0.7, w, h * 0.3);

    // Steering wheel
    ctx.strokeStyle = "rgba(230,230,240,0.9)";
    ctx.lineWidth = 5;
    ctx.beginPath();
    ctx.arc(w/2 + yaw*40, h*0.87, 60, 0, Math.PI*2);
    ctx.stroke();

    // HUD text
    ctx.fillStyle = "rgba(220,230,240,0.95)";
    ctx.font = "18px sans-serif";
    ctx.fillText("Peaceful Truck Delivery", 20, h * 0.73);
    ctx.fillText("Packages delivered: " + deliveredCount + " / " + deliveryStops.length, 20, h * 0.73 + 22);
    ctx.fillText(message, 20, h * 0.73 + 44);

    ctx.restore();
}

draw();
</script>

</body>
</html>
