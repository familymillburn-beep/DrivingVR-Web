<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Peaceful Truck Delivery – JoyCon Edition</title>
<style>
    body, html {
        margin: 0;
        padding: 0;
        overflow: hidden;
        background: #87a8d0;
    }
    #vr {
        position: absolute;
        width: 100%;
        height: 100%;
    }
</style>
</head>
<body>

<canvas id="vr"></canvas>

<script>
const canvas = document.getElementById("vr");
const ctx = canvas.getContext("2d");

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
resize();
window.onresize = resize;

// -----------------------------
// JOY-CON SUPPORT
// -----------------------------
let joyconX = 0;
let joyconA = false;

window.addEventListener("gamepadconnected", () => {
    console.log("Joy-Con connected!");
});

function readJoyCon() {
    const pads = navigator.getGamepads();
    for (let gp of pads) {
        if (!gp) continue;

        // Joy-Con Left or Right
        if (gp.id.includes("Joy-Con")) {

            // Stick X (usually axes[0])
            joyconX = gp.axes[0]; // -1 left, +1 right

            // A button (Right Joy-Con)
            joyconA = gp.buttons[0]?.pressed || false;

            return;
        }
    }
}

// -----------------------------
// GAME STATE
// -----------------------------
let playerZ = 0;
let speed = 0.04;
let steering = 0;

const buildings = [];
const deliveries = [];
let currentDelivery = 0;
let delivered = 0;
let message = "Relax and enjoy the drive.";

function initWorld() {
    buildings.length = 0;
    deliveries.length = 0;
    playerZ = 0;
    delivered = 0;
    currentDelivery = 0;

    // Town buildings
    for (let i = 0; i < 80; i++) {
        const side = Math.random() < 0.5 ? -1 : 1;
        buildings.push({
            x: side * (2 + Math.random() * 2),
            z: i * 4 + 10,
            w: 1 + Math.random(),
            h: 1 + Math.random() * 2,
            color: side < 0 ? "#c9d8e8" : "#d8e4f2"
        });
    }

    // Delivery points
    for (let i = 0; i < 6; i++) {
        deliveries.push({
            x: 0,
            z: 30 + i * 30,
            reached: false
        });
    }
}
initWorld();

// -----------------------------
// PROJECTOR
// -----------------------------
function project(x, y, z, eyeOffset, w, h) {
    const fov = 1.2;
    const zx = x - eyeOffset - steering * 0.8;
    const zy = z - playerZ + 1;

    const scale = fov / zy;
    const sx = w / 2 + zx * scale * w * 0.15;
    const sy = h * 0.75 - y * scale * h * 0.3;

    return { x: sx, y: sy, z: zy };
}

// -----------------------------
// MAIN LOOP
// -----------------------------
function draw() {
    const w = canvas.width;
    const h = canvas.height;
    const half = w / 2;

    readJoyCon();

    // Joy-Con steering overrides head tilt
    steering = joyconX * 1.2;

    // Move forward
    playerZ += speed;

    ctx.clearRect(0, 0, w, h);

    drawEye(0, half, h, -0.5);
    drawEye(half, half, h, 0.5);

    requestAnimationFrame(draw);
}

function drawEye(xOffset, w, h, eyeOffset) {
    ctx.save();
    ctx.translate(xOffset, 0);

    // Sky
    ctx.fillStyle = "#87a8d0";
    ctx.fillRect(0, 0, w, h);

    // Ground
    ctx.fillStyle = "#9bbf8f";
    ctx.fillRect(0, h * 0.75, w, h * 0.25);

    // Road
    ctx.fillStyle = "#4b4b4b";
    ctx.beginPath();
    ctx.moveTo(w * 0.3, h * 0.75);
    ctx.lineTo(w * 0.7, h * 0.75);
    ctx.lineTo(w * 0.55, h * 0.45);
    ctx.lineTo(w * 0.45, h * 0.45);
    ctx.closePath();
    ctx.fill();

    // Lane line
    ctx.strokeStyle = "#ffffffaa";
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(w / 2, h * 0.75);
    ctx.lineTo(w / 2, h * 0.5);
    ctx.stroke();

    // Buildings
    buildings.forEach(b => {
        const dz = b.z - playerZ;
        if (dz < 1 || dz > 80) return;

        const left = project(b.x - b.w/2, 0, b.z, eyeOffset, w, h);
        const right = project(b.x + b.w/2, 0, b.z, eyeOffset, w, h);
        const leftTop = project(b.x - b.w/2, b.h, b.z, eyeOffset, w, h);
        const rightTop = project(b.x + b.w/2, b.h, b.z, eyeOffset, w, h);

        ctx.fillStyle = b.color;
        ctx.beginPath();
        ctx.moveTo(left.x, left.y);
        ctx.lineTo(right.x, right.y);
        ctx.lineTo(rightTop.x, rightTop.y);
        ctx.lineTo(leftTop.x, leftTop.y);
        ctx.closePath();
        ctx.fill();
    });

    // Delivery points
    deliveries.forEach((d, i) => {
        const dz = d.z - playerZ;
        if (dz < 1 || dz > 80) return;

        const p = project(d.x, 0, d.z, eyeOffset, w, h);
        const size = 20 / dz * 20;

        ctx.fillStyle = i === currentDelivery ? "#a8ffd0" : "#d0ffe8";
        ctx.beginPath();
        ctx.arc(p.x, p.y, size, 0, Math.PI * 2);
        ctx.fill();

        // Delivery check (A button)
        if (!d.reached && i === currentDelivery && dz < 3 && joyconA) {
            d.reached = true;
            delivered++;
            currentDelivery++;
            message = "Package delivered. Peaceful roads ahead.";
        }
    });

    // Cockpit
    ctx.fillStyle = "rgba(0,0,0,0.5)";
    ctx.fillRect(0, h * 0.7, w, h * 0.3);

    // Steering wheel
    ctx.strokeStyle = "#ffffff";
    ctx.lineWidth = 5;
    ctx.beginPath();
    ctx.arc(w/2 + steering*40, h*0.87, 60, 0, Math.PI * 2);
    ctx.stroke();

    // HUD
    ctx.fillStyle = "#ffffff";
    ctx.font = "18px sans-serif";
    ctx.fillText("Peaceful Truck Delivery – JoyCon", 20, h * 0.73);
    ctx.fillText("Delivered: " + delivered + "/" + deliveries.length, 20, h * 0.73 + 22);
    ctx.fillText(message, 20, h * 0.73 + 44);

    ctx.restore();
}

draw();
</script>

</body>
</html>
