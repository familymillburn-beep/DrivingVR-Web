<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VR Horror Road – Gyro Shooter</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    overflow: hidden;
    background: black;
    touch-action: manipulation;
  }
  #vr {
    position: absolute;
    width: 100%;
    height: 100%;
  }
</style>
</head>
<body>
<canvas id="vr"></canvas>

<script>
const canvas = document.getElementById("vr");
const ctx = canvas.getContext("2d");

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

// --- GYRO (iOS needs permission) ---
let yaw = 0, pitch = 0;
let havePermission = false;

function requestMotion() {
  if (typeof DeviceOrientationEvent !== "undefined" &&
      typeof DeviceOrientationEvent.requestPermission === "function") {
    DeviceOrientationEvent.requestPermission().then(state => {
      if (state === "granted") {
        havePermission = true;
        window.addEventListener("deviceorientation", onOrient);
      }
    }).catch(console.error);
  } else {
    // non-iOS
    havePermission = true;
    window.addEventListener("deviceorientation", onOrient);
  }
}

function onOrient(e) {
  if (e.gamma != null && e.beta != null) {
    yaw = e.gamma / 30;   // left/right
    pitch = (e.beta - 45) / 40; // up/down, centered a bit forward
  }
}

// tap to shoot + request permission first time
let justShot = false;
window.addEventListener("touchstart", () => {
  if (!havePermission) requestMotion();
  justShot = true;
});

// --- GAME STATE ---
let playerZ = 0;
let speed = 0.08;
let health = 100;
let score = 0;

const enemies = [];

function spawnEnemy() {
  enemies.push({
    x: (Math.random() * 2 - 1) * 2.5,
    z: playerZ + 25 + Math.random() * 25,
    alive: true
  });
}
for (let i = 0; i < 10; i++) spawnEnemy();

// projection
function project(x, y, z, eyeOffset, w, h) {
  const fov = 1.2;
  const zx = x - eyeOffset - yaw * 1.2;
  const zy = z - playerZ + 1;
  const scale = fov / zy;
  const sx = w / 2 + zx * scale * w * 0.15;
  const sy = h * 0.7 - y * scale * h * 0.3 + pitch * 80;
  return { x: sx, y: sy, z: zy };
}

function draw() {
  const w = canvas.width;
  const h = canvas.height;
  const half = w / 2;

  playerZ += speed;
  if (Math.random() < 0.02) spawnEnemy();

  ctx.clearRect(0, 0, w, h);

  drawEye(0, half, h, -0.5);
  drawEye(half, half, h, 0.5);

  justShot = false;
  requestAnimationFrame(draw);
}

function drawEye(xOffset, w, h, eyeOffset) {
  ctx.save();
  ctx.translate(xOffset, 0);

  // background
  ctx.fillStyle = "#020208";
  ctx.fillRect(0, 0, w, h);

  // fog gradient
  const grad = ctx.createLinearGradient(0, 0, 0, h);
  grad.addColorStop(0, "#020208");
  grad.addColorStop(1, "#101018");
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, w, h);

  // road
  ctx.fillStyle = "#151515";
  ctx.beginPath();
  ctx.moveTo(w * 0.3, h * 0.8);
  ctx.lineTo(w * 0.7, h * 0.8);
  ctx.lineTo(w * 0.55, h * 0.45);
  ctx.lineTo(w * 0.45, h * 0.45);
  ctx.closePath();
  ctx.fill();

  // lane line
  ctx.strokeStyle = "#404040";
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(w / 2, h * 0.8);
  ctx.lineTo(w / 2, h * 0.5);
  ctx.stroke();

  // enemies
  enemies.forEach(e => {
    if (!e.alive) return;
    const dz = e.z - playerZ;
    if (dz < 0.5) {
      e.alive = false;
      health -= 10;
      return;
    }
    if (dz > 80) return;

    const p = project(e.x, 1.5, e.z, eyeOffset, w, h);
    const size = 40 / p.z * 10;

    // body
    ctx.fillStyle = "#700000";
    ctx.beginPath();
    ctx.ellipse(p.x, p.y, size * 0.6, size, 0, 0, Math.PI * 2);
    ctx.fill();

    // eyes
    ctx.fillStyle = "#ff4444";
    ctx.beginPath();
    ctx.arc(p.x - size * 0.2, p.y - size * 0.3, size * 0.15, 0, Math.PI * 2);
    ctx.arc(p.x + size * 0.2, p.y - size * 0.3, size * 0.15, 0, Math.PI * 2);
    ctx.fill();

    // shooting: use center of screen as crosshair
    const cx = w / 2;
    const cy = h * 0.6;
    if (justShot &&
        Math.abs(p.x - cx) < size * 0.7 &&
        Math.abs(p.y - cy) < size * 0.7) {
      e.alive = false;
      score += 10;
    }
  });

  // flashlight cone
  ctx.save();
  ctx.globalCompositeOperation = "lighter";
  ctx.fillStyle = "rgba(255,255,200,0.08)";
  const fx = w / 2;
  const fy = h * 0.7;
  ctx.beginPath();
  ctx.moveTo(fx, fy);
  ctx.lineTo(fx - 200 - yaw * 200, fy - 200 - pitch * 200);
  ctx.lineTo(fx + 200 - yaw * 200, fy - 200 - pitch * 200);
  ctx.closePath();
  ctx.fill();
  ctx.restore();

  // gun
  ctx.fillStyle = "#202020";
  ctx.beginPath();
  const gunOffsetX = yaw * 30;
  ctx.moveTo(w * 0.45 + gunOffsetX, h * 0.9);
  ctx.lineTo(w * 0.55 + gunOffsetX, h * 0.9);
  ctx.lineTo(w * 0.52 + gunOffsetX, h * 0.78);
  ctx.lineTo(w * 0.48 + gunOffsetX, h * 0.78);
  ctx.closePath();
  ctx.fill();

  // muzzle flash
  if (justShot) {
    ctx.fillStyle = "#ffdd88";
    ctx.beginPath();
    ctx.arc(w / 2 + gunOffsetX, h * 0.76, 18, 0, Math.PI * 2);
    ctx.fill();
  }

  // crosshair
  const cx = w / 2;
  const cy = h * 0.6;
  ctx.strokeStyle = "#ffdddd";
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(cx - 10, cy);
  ctx.lineTo(cx + 10, cy);
  ctx.moveTo(cx, cy - 10);
  ctx.lineTo(cx, cy + 10);
  ctx.stroke();

  // HUD
  ctx.fillStyle = "#ff4444";
  ctx.font = "14px sans-serif";
  ctx.fillText("HEALTH: " + health, 10, 22);
  ctx.fillStyle = "#ffffff";
  ctx.fillText("SCORE: " + score, 10, 40);

  if (health <= 0) {
    ctx.fillStyle = "rgba(0,0,0,0.85)";
    ctx.fillRect(0, 0, w, h);
    ctx.fillStyle = "#ff4444";
    ctx.font = "26px sans-serif";
    ctx.fillText("YOU DIED", w / 2 - 70, h / 2);
    ctx.font = "16px sans-serif";
    ctx.fillText("reload page to restart", w / 2 - 90, h / 2 + 28);
  }

  ctx.restore();
}

draw();
</script>
</body>
</html>
