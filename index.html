<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Driving VR – AR City</title>
<style>
    body, html {
        margin: 0;
        padding: 0;
        overflow: hidden;
        background: black;
    }
    #video {
        position: absolute;
        width: 100%;
        height: 100%;
        object-fit: cover;
        transform: scaleX(-1); /* mirror for VR */
    }
    #vr {
        position: absolute;
        width: 100%;
        height: 100%;
    }
</style>
</head>
<body>

<video id="video" autoplay playsinline></video>
<canvas id="vr"></canvas>

<script>
// CAMERA FEED
navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
.then(stream => {
    document.getElementById("video").srcObject = stream;
})
.catch(err => {
    console.log("Camera error:", err);
});

// VR CANVAS
const canvas = document.getElementById("vr");
const ctx = canvas.getContext("2d");

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
resize();
window.onresize = resize;

// HEAD TRACKING
let yaw = 0, pitch = 0;

window.addEventListener("deviceorientation", e => {
    if (e.gamma != null && e.beta != null) {
        yaw = e.gamma / 40;   // left/right tilt
        pitch = e.beta / 60;  // forward/back tilt
    }
});

// Simple "3D" building data
const buildings = [];
function initBuildings() {
    buildings.length = 0;
    for (let i = 0; i < 12; i++) {
        buildings.push({
            x: (i - 6) * 2,              // world X
            z: 5 + Math.random() * 15,   // depth
            h: 2 + Math.random() * 4     // height
        });
    }
}
initBuildings();

// Project world coords to screen (fake perspective)
function project(x, y, z, eyeOffset, w, h) {
    const fov = 1.2;
    const ex = eyeOffset; // eye offset in world space
    const zx = x - ex - yaw * 4; // parallax with yaw
    const zy = z + 1;

    const scale = fov / zy;
    const sx = w / 2 + zx * scale * w * 0.12;
    const sy = h * 0.8 - y * scale * h * 0.25 - pitch * 40;

    return { x: sx, y: sy };
}

// DRAW LOOP
function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    const w = canvas.width;
    const h = canvas.height;
    const half = w / 2;

    drawEye(0, half, h, -0.5);
    drawEye(half, half, h, 0.5);

    requestAnimationFrame(draw);
}

function drawEye(xOffset, w, h, eyeOffset) {
    ctx.save();
    ctx.translate(xOffset, 0);

    // Slight dark overlay to separate from camera
    ctx.fillStyle = "rgba(0,0,20,0.25)";
    ctx.fillRect(0, 0, w, h);

    // Draw ground plane
    ctx.fillStyle = "rgba(10, 10, 30, 0.8)";
    ctx.beginPath();
    ctx.moveTo(0, h * 0.8);
    ctx.lineTo(w, h * 0.8);
    ctx.lineTo(w, h);
    ctx.lineTo(0, h);
    ctx.closePath();
    ctx.fill();

    // Draw roads (perspective lines)
    ctx.strokeStyle = "rgba(80,80,120,0.8)";
    ctx.lineWidth = 2;
    for (let i = -2; i <= 2; i++) {
        ctx.beginPath();
        const sx = (w / 2) + i * 40;
        ctx.moveTo(sx, h * 0.8);
        ctx.lineTo(w / 2 + i * 10, h * 0.4);
        ctx.stroke();
    }

    // Draw buildings (simple extruded rectangles)
    buildings.forEach(b => {
        const base = project(b.x, 0, b.z, eyeOffset, w, h);
        const top = project(b.x, b.h, b.z, eyeOffset, w, h);

        const widthWorld = 1.2;
        const left = project(b.x - widthWorld/2, 0, b.z, eyeOffset, w, h);
        const right = project(b.x + widthWorld/2, 0, b.z, eyeOffset, w, h);
        const leftTop = project(b.x - widthWorld/2, b.h, b.z, eyeOffset, w, h);
        const rightTop = project(b.x + widthWorld/2, b.h, b.z, eyeOffset, w, h);

        // Front face
        ctx.fillStyle = "rgba(40, 80, 140, 0.9)";
        ctx.beginPath();
        ctx.moveTo(left.x, left.y);
        ctx.lineTo(right.x, right.y);
        ctx.lineTo(rightTop.x, rightTop.y);
        ctx.lineTo(leftTop.x, leftTop.y);
        ctx.closePath();
        ctx.fill();

        // Side face
        ctx.fillStyle = "rgba(20, 50, 110, 0.9)";
        ctx.beginPath();
        ctx.moveTo(right.x, right.y);
        ctx.lineTo(right.x + 20, right.y - 10);
        ctx.lineTo(rightTop.x + 20, rightTop.y - 10);
        ctx.lineTo(rightTop.x, rightTop.y);
        ctx.closePath();
        ctx.fill();

        // Windows
        ctx.fillStyle = "rgba(255, 255, 200, 0.6)";
        const rows = 5;
        const cols = 3;
        for (let r = 0; r < rows; r++) {
            for (let c = 0; c < cols; c++) {
                const t = r / (rows + 1);
                const s = (c + 1) / (cols + 1);
                const wx = left.x + (right.x - left.x) * s;
                const wy = left.y + (leftTop.y - left.y) * t;
                ctx.fillRect(wx - 3, wy - 3, 6, 6);
            }
        }
    });

    // Cockpit overlay
    ctx.fillStyle = "rgba(0,0,0,0.6)";
    ctx.fillRect(0, h * 0.7, w, h * 0.3);

    // Steering wheel
    ctx.strokeStyle = "white";
    ctx.lineWidth = 5;
    ctx.beginPath();
    ctx.arc(w/2 + yaw*40, h*0.87, 60, 0, Math.PI*2);
    ctx.stroke();

    // Speed text
    ctx.fillStyle = "white";
    ctx.font = "24px sans-serif";
    ctx.fillText("CITY DRIVE", w/2 - 60, h * 0.72);
    ctx.fillText("SPEED: 45", w/2 - 55, h * 0.72 + 28);

    ctx.restore();
}

draw();
</script>

</body>
</html>
